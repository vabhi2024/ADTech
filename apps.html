<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps</title>
  <!-- Google Font: Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
     font-family: 'Poppins', sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #000;
      color: white;
      font-size: 15px;
      padding: 5px;
      text-align: left;        
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 5px;
    }
    .app-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      text-align: center;
    }
    .app-card .img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 15px;
    }
    .download-btn {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-size: 14px;
    }
    .download-btn:hover {
      background: #0059c9;
    }
  </style>
</head>
<body>
  <header>
    <h3> ADTech India</h3>
</header>  
  <div class="container">  
      <div class="app-card">
    <img class="img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSB8_THvhCsAMQKHNUCrbD6Eby0W_YOQz_8LoPvEALxcw&s=10" alt="Equal App Logo" />
    <h3>Equal – AI Call Assistant</h3>
    <p>India's No. 1 AI Call Assistant. Trusted by 58K+ Indians. Handles delivery calls, identifies callers, and gives quick reply options.</p>
    <a class="download-btn" href="https://play.google.com/store/apps/details?id=in.equal.ai.assistant">Download App</a>
        <br><br>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSonaBJ_9ROGunT_y4I6TeKQPvFIO_JN5uNnGDdVmICyA&s=10" height="auto" width="100%" style="border-radius: 10px;">
      </div>
</div>
</body>
</html>
